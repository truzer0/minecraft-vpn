events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    map $http_user_agent $bad_bot {
        default 0;
        ~*PSP 1;
        ~*PlayStation\ Portable 1;
        ~*Opera\ 9 1;
        ~*Windows\ NT\ 5\.1.*Firefox/2\.0 1;
        ~*masscan 1;
        ~*nmap 1;
        ~*zgrab 1;
        ~*nikto 1;
        ~*sqlmap 1;
        ~*dirbuster 1;
    }

    limit_req_zone $binary_remote_addr zone=site:10m rate=20r/s;
    
    access_log /var/log/nginx/access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/error.log warn;

    upstream grafana_backend {
        server grafana:3000;
    }

    # HTTP редирект на HTTPS
    server {
        listen 80;
        server_name minecraft-proxy.ru www.minecraft-proxy.ru vpn.minecraft-proxy.ru dash.minecraft-proxy.ru grafana.minecraft-proxy.ru;
        return 301 https://$host$request_uri;
    }

    # Основной фронтенд (minecraft-proxy.ru)
    server {
        listen 443 ssl http2;
        server_name minecraft-proxy.ru www.minecraft-proxy.ru;

        ssl_certificate /etc/letsencrypt/live/minecraft-proxy.ru-0001/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/minecraft-proxy.ru-0001/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        root /usr/share/nginx/html;
        index index.html;

        if ($bad_bot) {
            return 403;
        }

        location ~* ^/\.(env|git|svn|htaccess|htpasswd|bashrc|bash_history|ssh) {
            access_log off;
            return 403;
        }

        location ~* \.(sql|log|bak|backup|old|save|swp|tmp|temp|orig|bkp|txt|cfg|ini|conf|yaml|yml)$ {
            access_log off;
            return 403;
        }

        location ~* /(phpinfo|info|phpinfo\.php|test\.php|index\.php) {
            access_log off;
            return 403;
        }

        location ~* /(admin|administrator|wp-admin|wp-login|cpanel|webmail|laravel|backend|api/api|dev|staging|crm|portal|dashboard) {
            access_log off;
            return 403;
        }

        location ~* /(HNAP1|cgi-bin|php-cgi|php-cgi\.exe|xmlrpc\.php) {
            access_log off;
            return 403;
        }

        location /api/ {
            limit_req zone=site burst=20 nodelay;
            proxy_pass http://app:8787;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            limit_req zone=site burst=10 nodelay;
            try_files $uri /index.html;
        }

        server_tokens off;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Панель 3x-ui (vpn.minecraft-proxy.ru)
    server {
        listen 443 ssl http2;
        server_name vpn.minecraft-proxy.ru;

        ssl_certificate /etc/letsencrypt/live/minecraft-proxy.ru-0001/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/minecraft-proxy.ru-0001/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://172.17.0.1:45821;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Важно для Vue.js приложения
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
 

    # Dash панель Minecraft (dash.minecraft-proxy.ru)
    server {
        listen 443 ssl http2;
        server_name dash.minecraft-proxy.ru;

        ssl_certificate /etc/letsencrypt/live/minecraft-proxy.ru-0001/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/minecraft-proxy.ru-0001/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://mcvpn-minecraft2:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # Grafana (grafana.minecraft-proxy.ru)
    server {
        listen 443 ssl http2;
        server_name grafana.minecraft-proxy.ru;

        ssl_certificate /etc/letsencrypt/live/minecraft-proxy.ru-0001/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/minecraft-proxy.ru-0001/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
